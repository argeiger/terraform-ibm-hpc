---
# Enabling HTTPS for Web Services

- name: Web Services | Enable HTTPS
  become: true
  become_flags: "-i"
  block:
    - name: Web Services | Enable HTTPS with lwsadmin
      ansible.builtin.command: >
        lwsadmin https enable
        --password {{ app_center_gui_password }}
        --validhosts {{ lsf_masters[0] }},localhost
      register: https_enable_result
      changed_when: "'already enabled' not in https_enable_result.stdout"
      no_log: true

    - name: Web Services | Restart lwsd service
      ansible.builtin.systemd:
        name: lwsd
        state: restarted
      when: "'already enabled' not in https_enable_result.stdout"

  rescue:
    - name: Web Services | HTTPS enable failed
      ansible.builtin.debug:
        msg: "Failed to enable HTTPS for Web Services using lwsadmin"

  always:
    - name: Web Services | HTTPS enable attempt completed
      ansible.builtin.debug:
        msg: "Web Services HTTPS configuration block executed"
