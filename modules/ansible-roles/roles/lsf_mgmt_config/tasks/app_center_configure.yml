---
# AppCenter HTTPS Configuration

- name: PAC | Check if HTTPS is already enabled
  become: true
  become_flags: "-i"
  ansible.builtin.command: pmcadmin https enable
  register: https_check
  changed_when: "'was already enabled' not in https_check.stdout"
  failed_when: false

- name: PAC | HTTPS already enabled
  ansible.builtin.debug:
    msg: "HTTPS is already enabled"
  when: "'was already enabled' in https_check.stdout"

- name: PAC | Configure HTTPS for AppCenter
  become: true
  become_flags: "-i"
  block:

    - name: PAC | Set GUI password for lsfadmin
      ansible.builtin.command: passwd --stdin lsfadmin
      args:
        stdin: "{{ app_center_gui_password }}"
      no_log: true

    - name: PAC | Enable HTTPS access
      ansible.builtin.command: >
        pmcadmin https enable
        --password {{ app_center_gui_password }}
        --validhosts localhost
      no_log: true

    - name: PAC | Restart pmcadmin
      block:
        - name: PAC | Stop pmcadmin
          ansible.builtin.command: pmcadmin stop

        - pause:
            seconds: 5

        - name: PAC | Start pmcadmin
          ansible.builtin.command: pmcadmin start

      rescue:
        - name: PAC | pmcadmin restart failed
          ansible.builtin.debug:
            msg: "pmcadmin restart failed. Manual intervention may be required."

      always:
        - name: PAC | pmcadmin restart attempt finished
          ansible.builtin.debug:
            msg: "pmcadmin restart block executed."

    - name: PAC | Update JS_PAC_SERVER_URL
      ansible.builtin.lineinfile:
        path: "{{ JS_PAC_SERVER_URL }}"
        regexp: '^JS_PAC_SERVER_URL='
        line: "JS_PAC_SERVER_URL=https://{{ lsf_masters[0] }}:8443"

    - name: PAC | Restart ACD service
      ansible.builtin.service:
        name: acd
        state: restarted

  rescue:
    - name: PAC | HTTPS configuration failed
      ansible.builtin.debug:
        msg: "AppCenter HTTPS configuration failed. Check logs."

  always:
    - name: PAC | HTTPS configuration completed
      ansible.builtin.debug:
        msg: "AppCenter HTTPS configuration block completed."

  when: "'was already enabled' not in https_check.stdout"
