---

- name: Log directories | Create shared base directories for LSF
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode | default('0755') }}"
    recurse: yes
    owner: lsfadmin
    group: root
  loop:
    - { path: "{{ SHARED_PATH }}/data", mode: '0755' }
    - { path: "{{ SHARED_PATH }}/logs", mode: '0755' }
    - { path: "{{ SHARED_PATH }}/repository-path", mode: '0755' }
    - { path: "{{ SHARED_PATH }}/das_staging_area", mode: '0755' }
  when: inventory_hostname == groups['management_nodes'][0]

- name: Log directories | Create per-host log directory in shared storage
  file:
    path: "{{ SHARED_PATH }}/logs/{{ inventory_hostname }}"
    state: directory
    mode: '0777'
    owner: lsfadmin
    group: root
  when: inventory_hostname in groups['management_nodes']

- name: Log directories | Move existing local logs to shared location
  ansible.builtin.shell: |
    mv {{ LSF_LOGS }}/* {{ SHARED_PATH }}/logs/{{ inventory_hostname }}/ 2>/dev/null || true
  when: inventory_hostname in groups['management_nodes']

- name: Log directories | Ensure LSF log directory is a symlink to shared path
  shell: |
    if [ -L "{{ LSF_TOP }}/{{ item }}" ]; then
      echo "Symlink exists, skipping."
    else
      if [ -d "{{ LSF_TOP }}/{{ item }}" ]; then
        rm -rf "{{ LSF_TOP }}/{{ item }}"
      fi
      ln -s "{{ SHARED_PATH }}/logs/{{ inventory_hostname }}" "{{ LSF_TOP }}/{{ item }}"
    fi
  loop:
    - log
  when: inventory_hostname in groups['management_nodes']

- name: Log directories | Ensure correct permissions on shared per-host log directory
  file:
    path: "{{ SHARED_PATH }}/logs/{{ inventory_hostname }}"
    state: directory
    mode: '0777'
    recurse: yes
    owner: lsfadmin
    group: root
  when: inventory_hostname in groups['management_nodes']

- name: Log directories | Ensure recursive permissions on LSF log path
  ansible.builtin.file:
    path: "{{ LSF_LOGS }}"
    state: directory
    owner: lsfadmin
    group: root
    mode: '0777'
    recurse: yes
    follow: yes
  when: inventory_hostname in groups['management_nodes']

- name: Log directories | Create symlink for shared data directory under LSF_TOP
  file:
    src: "{{ SHARED_PATH }}/data"
    dest: "{{ LSF_TOP }}/work/data"
    state: link
    force: yes
  when: inventory_hostname == groups['management_nodes'][0]

- name: Log directories | Ensure ownership of shared data directory
  file:
    path: "{{ SHARED_PATH }}/data"
    state: directory
    recurse: yes
    owner: lsfadmin
    group: root
  when: inventory_hostname == groups['management_nodes'][0]

- name: Log directories | Ensure symlink for das_staging_area under LSF_TOP
  shell: |
    [ -L "{{ LSF_TOP }}/{{ item }}" ] && echo "Symlink exists, skipping." || { \
      [ -d "{{ LSF_TOP }}/{{ item }}" ] && rm -rf "{{ LSF_TOP }}/{{ item }}"; \
      ln -s "{{ SHARED_PATH }}/{{ item }}" "{{ LSF_TOP }}/{{ item }}"; }
  loop:
    - das_staging_area
  when: inventory_hostname == groups['management_nodes'][0]

- name: LoginNode | Read LSF hosts file from shared configuration
  slurp:
    src: "{{ SHARED_PATH }}/conf/hosts"
  register: lsf_hosts_file
  when: inventory_hostname == groups['login_node'][0]

- name: LoginNode | Append LSF host entries to /etc/hosts
  blockinfile:
    path: /etc/hosts
    create: yes
    marker: "# {mark} LSF HOSTS BLOCK"
    insertafter: EOF
    block: |
      {{ lsf_hosts_file.content | b64decode }}
  become: yes
  when: inventory_hostname == groups['login_node'][0]

- name: LoginNode | Set ownership for /etc/hosts
  ansible.builtin.file:
    path: /etc/hosts
    owner: lsfadmin
    group: root
  become: yes
  when: inventory_hostname == groups['login_node'][0]

- name: Log Cleanup | Check if LSF log cleanup was already performed
  ansible.builtin.stat:
    path: /opt/ibm/lsf/log/.cleanup_done
  register: cleanup_marker
  when:
    - inventory_hostname in groups['mgmt_compute_nodes']

- name: Log Cleanup | Remove old logs except fluent logs
  ansible.builtin.shell: |
    find /opt/ibm/lsf/log/ -type f ! -name 'fluent*' -exec rm -f {} \;
  become: true
  when:
    - inventory_hostname in groups['mgmt_compute_nodes']
    - not cleanup_marker.stat.exists

- name: Log Cleanup | Create cleanup marker file
  ansible.builtin.file:
    path: /opt/ibm/lsf/log/.cleanup_done
    state: touch
  become: true
  when:
    - inventory_hostname in groups['mgmt_compute_nodes']
    - not cleanup_marker.stat.exists

# Restart LSF daemon (lsfd) service on the first management node
- name: Service | Restart LSF daemon (lsfd)
  service:
    name: lsfd
    state: restarted
  when: inventory_hostname in groups['management_nodes']

# Restart the NetworkManager service on all nodes
- name: Service | Restart NetworkManager service
  service:
    name: NetworkManager
    state: restarted
